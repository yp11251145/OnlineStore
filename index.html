<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie store</title>
    <style>
        :root {
            --santa-red: #b30000; 
            --light-bg: #fdf2f2;
            --dark-gray: #333;
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            color: var(--dark-gray); 
            background-color: var(--light-bg); 
        }

        /* HEADER */
        header { 
            background: #fff; 
            padding: 1.5rem 5%; 
            border-bottom: 5px solid var(--santa-red);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            gap: 12px;
        }

        .cookie-logo { height: 2.5rem; width: auto; fill: var(--santa-red); }

        header h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem; 
            color: var(--santa-red);
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* CATEGORY NAVIGATION */
        .category-nav {
            background: #fff;
            padding: 1rem 5%;
            display: flex;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #fff;
            border: 2px solid var(--santa-red);
            color: var(--santa-red);
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: var(--santa-red);
            color: #fff;
        }

        .container { width: 95%; max-width: 1200px; margin: 2rem auto; }

        /* TITLES */
        .section-title {
            color: var(--santa-red);
            border-bottom: 3px solid var(--santa-red);
            display: inline-block;
            margin: 4rem 0 1.5rem 0;
            padding-right: 40px;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
        }

        /* PRODUCT CARDS */
        .product-section { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }
        
        .product-card { 
            background: #fff; 
            border: 2px solid #eee;
            border-radius: 12px; 
            padding: 1rem; 
            text-align: center; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover { 
            border-color: var(--santa-red);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(179, 0, 0, 0.1);
        }

        .product-card img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 8px; 
            background-color: #f9f9f9;
        }

        .product-card h4 { margin: 12px 0 5px 0; font-size: 1.1rem; }
        .desc { font-size: 0.85rem; color: #666; margin: 0 0 10px 0; font-style: italic; }
        .price { font-weight: bold; color: var(--santa-red); font-size: 1.3rem; margin-bottom: 10px; }

        /* CART SECTION */
        .cart-section { 
            background: #fff; 
            padding: 2rem; 
            border-radius: 12px; 
            border: 3px solid var(--santa-red); 
            margin: 4rem 0; 
        }

        .cash-notice {
            background-color: var(--santa-red);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-total { text-align: right; font-size: 1.8rem; font-weight: bold; color: var(--santa-red); margin-top: 15px; }

        /* FORM */
        .order-section { background: #fff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        form { display: flex; flex-direction: column; }
        label { margin-top: 15px; font-weight: bold; color: var(--santa-red); }
        input, textarea { padding: 12px; margin-top: 8px; border: 2px solid #eee; border-radius: 6px; font-size: 1rem; }
        input:focus { border-color: var(--santa-red); outline: none; }

        /* BUTTONS */
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .add-btn { background: var(--santa-red); color: white; width: 100%; font-size: 0.9rem; }
        .add-btn:hover { background: #800000; }
        .submit-btn { background: var(--dark-gray); color: white; margin-top: 25px; font-size: 1.2rem; }
        .submit-btn:hover { background: #000; }

        footer { text-align: center; padding: 3rem; color: #999; }
    </style>
</head>
