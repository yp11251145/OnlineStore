<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Animal Store | The finest animal supplier</title>
    <style>
        /* CSS - The "Look" of your store */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: #f9f9f9;
        }

        header {
            background: #fff;
            padding: 1rem 10%;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .container {
            width: 80%;
            margin: 2rem auto;
        }

        /* Product Grid */
        .product-section {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .product-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1.5rem;
            width: 280px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .product-card img {
            max-width: 100%;
            border-radius: 4px;
        }

        .price {
            font-weight: bold;
            color: #27ae60;
            font-size: 1.2rem;
        }

        /* Order Form */
        .order-section {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ddd;
        }

        .order-section h2 {
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #555;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Online Animal Store</h1>
        <p>Fresh Meat Supplier.</p>
    </header>

    <div class="container">
        
        <section class="product-section">
            <div class="product-card">
                <img src="https://www.shutterstock.com/image-photo/cute-baby-piglet-highly-detailed-600nw-2705951625.jpg" alt="Little piggy (3 months old)">
                <h3>Little piggy (3 months old)</h3>
                <p>The most tender meat you can find.</p>
                <p class="price">$25.00</p>
                <button onclick="selectProduct('Little piggy (3 months old)')">Buy Now</button>
            </div>

            <div class="product-card">
                <img src="https://transforms.stlzoo.org/production/animals/reticulated-giraffe-01-01.jpg?w=1200&h=1200&auto=compress%2Cformat&fit=crop&dm=1658951271&s=539e4b5c7b1f8c0287834e192ecc61d0" alt="Giraffe">
                <h3>Giraffe</h3>
                <p>Mysterious meat. Wonder what's the taste.</p>
                <p class="price">$9000.00</p>
                <button onclick="selectProduct('Giraffe')">Buy Now</button>
            </div>
        </section>

        <section class="order-section" id="order">
            <h2>Place Your Order</h2>
            <form id="orderForm" action="https://formspree.io/f/YOUR_ENDPOINT_HERE" method="POST">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="customer_name" required placeholder="John Doe">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="customer_email" required placeholder="john@example.com">

                <label for="product">Select Product</label>
                <select id="product" name="product_name" required>
                    <option value="">-- Choose a product --</option>
                    <option value="Little piggy (3 months old)">Little piggy (3 months old) - $25.00</option>
                    <option value="Giraffe">Giraffe - $9000.00</option>
                </select>

                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" required>

                <label for="message">Message/Special Instructions</label>
                <textarea id="message" name="message" rows="4" placeholder="Any specific requests?"></textarea>

                <button type="submit">Send Order Details</button>
            </form>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 Online Animal Store. All rights reserved.</p>
    </footer>

    <script>
        // Simple script to auto-select the product when "Buy Now" is clicked
        function selectProduct(productName) {
            document.getElementById('product').value = productName;
            document.getElementById('order').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
