<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Animal Store | The finest animal supplier</title>
    <style>
        /* CSS - The "Look" of your store */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: #f9f9f9;
        }

        header {
            background: #fff;
            padding: 1rem 10%;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .container {
            width: 80%;
            margin: 2rem auto;
        }

        /* Product Grid */
        .product-section {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .product-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1.5rem;
            width: 280px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }

        .price {
            font-weight: bold;
            color: #c0392b; /* A slightly "meatier" red color */
            font-size: 1.2rem;
        }

        /* NEW: Cart Styles */
        .cart-section {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            border: 2px dashed #333;
            margin-bottom: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-total {
            text-align: right;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Order Form */
        .order-section {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #ddd;
        }

        form { display: flex; flex-direction: column; }
        label { margin-top: 10px; font-weight: bold; }
        input, select, textarea { padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }

        button {
            margin-top: 20px;
            padding: 12px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover { background: #555; }
        .add-btn { background: #27ae60; width: 100%; }
        .add-btn:hover { background: #219150; }

        footer { text-align: center; padding: 2rem; color: #777; }
    </style>
</head>
<body>

    <header>
        <h1>Online Animal Store</h1>
        <p>Fresh Meat Supplier.</p>
    </header>

    <div class="container">
        
        <section class="product-section">
            <div class="product-card">
                <img src="https://www.shutterstock.com/image-photo/cute-baby-piglet-highly-detailed-600nw-2705951625.jpg" alt="Little piggy">
                <h3>Little piggy (3 months old)</h3>
                <p>The most tender meat you can find.</p>
                <p class="price">$25.00</p>
                <button class="add-btn" onclick="addToCart('Little piggy (3 months old)', 25)">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://d1jyxxz9imt9yb.cloudfront.net/medialib/4659/image/s768x1300/AdobeStock_331202050_538219_reduced.jpg" alt="Giraffe">
                <h3>Giraffe</h3>
                <p>Mysterious meat. Wonder what's the taste.</p>
                <p class="price">$9000.00</p>
                <button class="add-btn" onclick="addToCart('Giraffe', 9000)">Add to Cart</button>
            </div>
        </section>

        <section class="cart-section" id="cart">
            <h2>Your Selection</h2>
            <div id="cart-items">
                <p style="color: #888;">Your cart is empty.</p>
            </div>
            <div class="cart-total">Total: $<span id="total-price">0.00</span></div>
        </section>

        <section class="order-section" id="order">
            <h2>Customer Information</h2>
            <form id="orderForm" action="https://formspree.io/f/YOUR_ENDPOINT_HERE" method="POST">
                
                <label for="name">Your Name</label>
                <input type="text" name="customer_name" required placeholder="John Doe">

                <label for="email">Email Address</label>
                <input type="email" name="customer_email" required placeholder="john@example.com">

                <input type="hidden" id="cart-data-input" name="full_order_list">

                <label for="message">Message/Special Instructions</label>
                <textarea id="message" name="message" rows="4" placeholder="How would you like it prepared?"></textarea>

                <button type="submit">Finalize Meat Order</button>
            </form>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 Online Animal Store. All rights reserved.</p>
    </footer>

    <script>
        // Array to store the items
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            // 1. Add item to the array
            cart.push({ name: name, price: price });
            
            // 2. Refresh the display
            updateUI();
        }

        function updateUI() {
            const cartContainer = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('total-price');
            const hiddenInput = document.getElementById('cart-data-input');
            
            // Clear current display
            cartContainer.innerHTML = '';
            total = 0;
            let orderSummary = "";

            // Loop through the cart and build the list
            cart.forEach((item) => {
                total += item.price;
                orderSummary += item.name + " ($" + item.price + ")\n";

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${item.name}</span> <span>$${item.price}</span>`;
                cartContainer.appendChild(div);
            });

            // Update Total and the hidden input for Formspree
            totalDisplay.innerText = total.toLocaleString(); // Format with commas
            hiddenInput.value = orderSummary + "\nGRAND TOTAL: $" + total;

            // Scroll to cart so user knows it was added
            document.getElementById('cart').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
</html>
